name: Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore NvidiaDisplayController.sln

      - name: Build
        run: dotnet build NvidiaDisplayController.sln --configuration Release --no-restore

      - name: Publish (self-contained)
        run: >
          dotnet publish NvidiaDisplayController/NvidiaDisplayController.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish-github

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NvidiaDisplayController
          path: |
            publish-github/NvidiaDisplayController.exe
            publish-github/Data/

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore NvidiaDisplayController.sln

      - name: Publish (self-contained)
        run: >
          dotnet publish NvidiaDisplayController/NvidiaDisplayController.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish-github

      - name: Create zip
        run: Compress-Archive -Path publish-github/* -DestinationPath NvidiaDisplayController-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NvidiaDisplayController-${{ github.ref_name }}.zip
          generate_release_notes: true
