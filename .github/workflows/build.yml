name: Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.0.1
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore NvidiaDisplayController.sln

      - name: Build
        run: dotnet build NvidiaDisplayController.sln --configuration Release --no-restore

      - name: Publish (self-contained)
        run: >
          dotnet publish NvidiaDisplayController/NvidiaDisplayController.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish-github

      - name: Build Microsoft Store package
        run: >
          msbuild NvidiaDisplayController.Package/NvidiaDisplayController.Package.wapproj
          /restore
          /p:Configuration=Release
          /p:Platform=x64
          /p:UapAppxPackageBuildMode=StoreUpload
          /p:AppxBundle=Never
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\\"

      - name: Upload artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name: NvidiaDisplayController
          path: |
            publish-github/NvidiaDisplayController.exe
            publish-github/Data/
            AppPackages/**/*.msixupload
            AppPackages/**/*.appxupload
            AppPackages/**/*.msix
            AppPackages/**/*.appx

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore NvidiaDisplayController.sln

      - name: Publish (self-contained)
        run: >
          dotnet publish NvidiaDisplayController/NvidiaDisplayController.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish-github

      - name: Build Microsoft Store package
        run: >
          msbuild NvidiaDisplayController.Package/NvidiaDisplayController.Package.wapproj
          /restore
          /p:Configuration=Release
          /p:Platform=x64
          /p:UapAppxPackageBuildMode=StoreUpload
          /p:AppxBundle=Never
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\\"

      - name: Create zip
        run: Compress-Archive -Path publish-github/* -DestinationPath NvidiaDisplayController-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.5
        with:
          files: |
            NvidiaDisplayController-${{ github.ref_name }}.zip
            AppPackages/**/*.msixupload
            AppPackages/**/*.appxupload
            AppPackages/**/*.msix
            AppPackages/**/*.appx
          generate_release_notes: true
